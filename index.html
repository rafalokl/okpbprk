<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Histogram czasów realizacji</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.1.0/dist/chartjs-plugin-annotation.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      margin: 0;
      padding: 20px;
    }
    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 8px;
    }
    p.subtitle {
      text-align: center;
      color: #666;
      margin-top: 0;
      margin-bottom: 24px;
      font-size: 14px;
    }
    .chart-container {
      max-width: 860px;
      margin: 0 auto;
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      padding: 32px 40px;
    }
    .stat-controls {
      max-width: 860px;
      margin: 16px auto 0;
      display: flex;
      flex-wrap: wrap;
      gap: 12px 24px;
      justify-content: center;
    }
    .stat-controls label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: #444;
      cursor: pointer;
      user-select: none;
    }
    .stat-controls input[type="checkbox"] {
      width: 15px;
      height: 15px;
      cursor: pointer;
    }
    .stat-swatch {
      display: inline-block;
      width: 24px;
      height: 3px;
      border-radius: 2px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <h1>Histogram czasów realizacji</h1>
  <p class="subtitle">Rozkład czasów realizacji zadań według rozmiaru (S / M / L)</p>
  <div class="chart-container">
    <canvas id="histogram"></canvas>
  </div>
  <div class="stat-controls">
    <label>
      <input type="checkbox" id="toggle-mean" checked>
      <span class="stat-swatch" style="background:#e53935;"></span>
      Średnia (<span id="val-mean">–</span> dni)
    </label>
    <label>
      <input type="checkbox" id="toggle-median" checked>
      <span class="stat-swatch" style="background:#1e88e5;"></span>
      Mediana (<span id="val-median">–</span> dni)
    </label>
    <label>
      <input type="checkbox" id="toggle-p85" checked>
      <span class="stat-swatch" style="background:#fb8c00;"></span>
      85. percentyl (<span id="val-p85">–</span> dni)
    </label>
    <label>
      <input type="checkbox" id="toggle-p95" checked>
      <span class="stat-swatch" style="background:#8e24aa;"></span>
      95. percentyl (<span id="val-p95">–</span> dni)
    </label>
  </div>

  <script>
    // Dane z pliku "1 Histogram czasów realizacji.csv"
    const rawData = [
      { size: 'S', time: 49 }, { size: 'S', time: 48 }, { size: 'S', time: 87 },
      { size: 'M', time: 57 }, { size: 'M', time: 148 }, { size: 'S', time: 53 },
      { size: 'S', time: 45 }, { size: 'M', time: 145 }, { size: 'L', time: 105 },
      { size: 'S', time: 5  }, { size: 'L', time: 163 }, { size: 'S', time: 43 },
      { size: 'M', time: 415 }, { size: 'L', time: 123 }, { size: 'M', time: 103 },
      { size: 'L', time: 104 }, { size: 'L', time: 302 }, { size: 'L', time: 158 },
      { size: 'L', time: 98  }, { size: 'S', time: 52  }, { size: 'M', time: 95 },
      { size: 'S', time: 70  }, { size: 'M', time: 95  }, { size: 'M', time: 101 },
      { size: 'M', time: 57  }, { size: 'M', time: 57  }, { size: 'S', time: 53 },
      { size: 'L', time: 137 }, { size: 'S', time: 73  }, { size: 'M', time: 60 },
      { size: 'S', time: 126 }, { size: 'M', time: 57  }, { size: 'L', time: 124 },
      { size: 'M', time: 75  }, { size: 'M', time: 89  }, { size: 'S', time: 44 },
    ];

    // Przedziały histogramu (szerokość 50 dni)
    const bins = [
      { label: '0–50',    min: 0,   max: 50  },
      { label: '51–100',  min: 51,  max: 100 },
      { label: '101–150', min: 101, max: 150 },
      { label: '151–200', min: 151, max: 200 },
      { label: '201–250', min: 201, max: 250 },
      { label: '251–300', min: 251, max: 300 },
      { label: '301–350', min: 301, max: 350 },
      { label: '351–400', min: 351, max: 400 },
      { label: '401–450', min: 401, max: 450 },
    ];

    const sizes = ['S', 'M', 'L'];
    const colors  = { S: 'rgba(54,162,235,0.8)',  M: 'rgba(255,159,64,0.8)',  L: 'rgba(75,192,100,0.8)' };
    const borders = { S: 'rgba(54,162,235,1)',     M: 'rgba(255,159,64,1)',    L: 'rgba(75,192,100,1)'   };

    const datasets = sizes.map(size => ({
      label: 'Rozmiar ' + size,
      data: bins.map(bin =>
        rawData.filter(d => d.size === size && d.time >= bin.min && d.time <= bin.max).length
      ),
      backgroundColor: colors[size],
      borderColor: borders[size],
      borderWidth: 1,
    }));

    // Obliczenia statystyk
    function calcStats(data) {
      const times = data.map(d => d.time).sort((a, b) => a - b);
      const n = times.length;
      const mean = times.reduce((s, v) => s + v, 0) / n;
      const median = n % 2 === 0
        ? (times[n / 2 - 1] + times[n / 2]) / 2
        : times[Math.floor(n / 2)];
      function percentile(p) {
        const pos = p * (n - 1);
        const lo = Math.floor(pos);
        const hi = Math.min(lo + 1, n - 1);
        return times[lo] + (pos - lo) * (times[hi] - times[lo]);
      }
      return { mean, median, p85: percentile(0.85), p95: percentile(0.95) };
    }

    // Przeliczenie wartości (dni) na pozycję osi X histogramu (float index)
    function valueToX(value, binsArr) {
      for (let i = 0; i < binsArr.length; i++) {
        const b = binsArr[i];
        if (value >= b.min && value < b.max + 1) {
          const binWidth = b.max + 1 - b.min;
          return i + (value - b.min) / binWidth - 0.5;
        }
      }
      if (value < binsArr[0].min) return -0.5;
      return binsArr.length - 0.5;
    }

    const stats = calcStats(rawData);

    // Aktualizacja etykiet w kontrolkach
    document.getElementById('val-mean').textContent   = stats.mean.toFixed(1);
    document.getElementById('val-median').textContent = stats.median.toFixed(1);
    document.getElementById('val-p85').textContent    = stats.p85.toFixed(1);
    document.getElementById('val-p95').textContent    = stats.p95.toFixed(1);

    const statAnnotations = {
      mean: {
        display: true,
        type: 'line', scaleID: 'x', value: valueToX(stats.mean, bins),
        borderColor: '#e53935', borderWidth: 2, borderDash: [6, 4],
        label: {
          display: true,
          content: 'Śr. ' + stats.mean.toFixed(1) + ' d',
          position: 'start', yAdjust: -6,
          backgroundColor: 'rgba(229,57,53,0.15)', color: '#c62828',
          font: { size: 11, weight: 'bold' },
        },
      },
      median: {
        display: true,
        type: 'line', scaleID: 'x', value: valueToX(stats.median, bins),
        borderColor: '#1e88e5', borderWidth: 2, borderDash: [6, 4],
        label: {
          display: true,
          content: 'Med. ' + stats.median.toFixed(1) + ' d',
          position: 'start', yAdjust: -22,
          backgroundColor: 'rgba(30,136,229,0.15)', color: '#1565c0',
          font: { size: 11, weight: 'bold' },
        },
      },
      p85: {
        display: true,
        type: 'line', scaleID: 'x', value: valueToX(stats.p85, bins),
        borderColor: '#fb8c00', borderWidth: 2, borderDash: [6, 4],
        label: {
          display: true,
          content: 'P85 ' + stats.p85.toFixed(1) + ' d',
          position: 'start', yAdjust: -38,
          backgroundColor: 'rgba(251,140,0,0.15)', color: '#e65100',
          font: { size: 11, weight: 'bold' },
        },
      },
      p95: {
        display: true,
        type: 'line', scaleID: 'x', value: valueToX(stats.p95, bins),
        borderColor: '#8e24aa', borderWidth: 2, borderDash: [6, 4],
        label: {
          display: true,
          content: 'P95 ' + stats.p95.toFixed(1) + ' d',
          position: 'start', yAdjust: -54,
          backgroundColor: 'rgba(142,36,170,0.15)', color: '#6a1b9a',
          font: { size: 11, weight: 'bold' },
        },
      },
    };

    const ctx = document.getElementById('histogram').getContext('2d');
    const chart = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: bins.map(b => b.label),
        datasets: datasets,
      },
      options: {
        responsive: true,
        plugins: {
          legend: { position: 'top' },
          tooltip: {
            callbacks: {
              title: items => 'Przedział: ' + items[0].label + ' dni',
              label: item  => ' ' + item.dataset.label + ': ' + item.parsed.y + ' zadań',
            },
          },
          annotation: {
            annotations: statAnnotations,
          },
        },
        scales: {
          x: {
            stacked: true,
            title: { display: true, text: 'Czas realizacji (dni)', font: { size: 13 } },
          },
          y: {
            stacked: true,
            beginAtZero: true,
            title: { display: true, text: 'Liczba zadań', font: { size: 13 } },
            ticks: { stepSize: 1 },
          },
        },
      },
    });

    // Obsługa przełączników widoczności linii
    ['mean', 'median', 'p85', 'p95'].forEach(id => {
      document.getElementById('toggle-' + id).addEventListener('change', function () {
        chart.options.plugins.annotation.annotations[id].display = this.checked;
        chart.update();
      });
    });
  </script>
</body>
</html>
